name: OrangeFox Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'Android Version (7.1, 12.1, 14.1)'
        required: true
        default: '9.0'
      DEVICE_TREE_URL:
        description: 'Device Tree URL'
        required: true
        default: 'https://github.com/ixi5657/alcatel-1c-device-tree'
      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'Device Path'
        required: true
        default: 'tcl/U5A_PLUS_3G'
      DEVICE_NAME:
        description: 'Device Name'
        required: true
        default: 'U5A_PLUS_3G'
      MAKEFILE_NAME:
        description: 'Makefile Name'
        required: true
        default: 'omni_U5A_PLUS_3G'
      BUILD_TARGET:
        description: 'Build Target'
        required: true
        default: 'recoveryimage'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update -y
        sudo apt-get install -y \
          git-core gnupg flex bison gperf build-essential \
          zip curl zlib1g-dev gcc-multilib g++-multilib \
          libc6-dev-i386 libncurses5-dev libncursesw5-dev \
          lib32ncurses-dev libx11-dev ccache libgl1-mesa-dev \
          libxml2-utils xsltproc unzip m4 bc gawk \
          liblz4-tool libsdl1.2-dev lzop pngcrush schedtool \
          squashfs-tools xsltproc zip zlib1g-dev \
          python2.7 python2-dev
        
        # Python 2 для Android 7.1
        sudo ln -sf /usr/bin/python2.7 /usr/bin/python
        python --version

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Setup Repo Tool
      run: |
        mkdir -p ~/.bin
        curl -o ~/.bin/repo https://storage.googleapis.com/git-repo-downloads/repo
        chmod a+x ~/.bin/repo
        echo "${HOME}/.bin" >> $GITHUB_PATH

    - name: Sync Sources
      run: |
        mkdir -p workspace && cd workspace
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-7.1
        repo sync -c --force-sync --no-clone-bundle --no-tags -j$(nproc --all)

    - name: Setup OrangeFox 9.0
      run: |
        cd workspace
        rm -rf build/make bootable/recovery
        git clone https://gitlab.com/OrangeFox/build/make.git -b fox_9.0 build/make
        git clone https://gitlab.com/OrangeFox/bootable/recovery.git -b fox_9.0 bootable/recovery

    - name: Clone Device Tree
      run: |
        mkdir -p workspace/$(dirname ${{ github.event.inputs.DEVICE_PATH }})
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} workspace/${{ github.event.inputs.DEVICE_PATH }}

    - name: Build
      run: |
        cd workspace
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-eng
        mka ${{ github.event.inputs.BUILD_TARGET }} -j$(nproc --all)

    - name: Upload
      uses: softprops/action-gh-release@v2
      with:
        files: workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/*.img
        name: OrangeFox-${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
